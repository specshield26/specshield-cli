openapi: "3.0.0"
info:
  title: Payment API
  version: "1.0.0"

paths:
  /payments:
    post:
      operationId: createPayment
      summary: Create a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
                - amount
                - currency
              properties:
                orderId:
                  type: string
                amount:
                  type: integer
                currency:
                  type: string
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{paymentId}:
    get:
      operationId: getPayment
      summary: Get payment by ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /orders/{orderId}:
    delete:
      operationId: deleteOrder
      summary: Cancel an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Order cancelled

components:
  schemas:
    Payment:
      type: object
      properties:
        paymentId:
          type: string
        orderId:
          type: string
        status:
          type: string
        amount:
          type: integer
        currency:
          type: string
        createdAt:
          type: string
